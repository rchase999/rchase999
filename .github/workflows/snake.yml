name: Generate Snake Animation

on:
  # Re-generate every 12 hours so it stays up to date
  schedule:
    - cron: "0 */12 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Runs on push to main so you can see it work right away
  push:
    branches:
      - main

permissions:
  contents: write

# Keeps these community actions running after GitHub's June 16, 2026
# switch to Node.js 24 (they were built for Node 20).
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
