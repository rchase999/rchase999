name: Generate 3D Contribution Graph

on:
  # Re-generate once a day
  schedule:
    - cron: "0 18 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Runs on push to main so you can see it work right away
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate the 3D SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push the generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "Update 3D contribution graph" || echo "Nothing to commit"
          git push
